name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Debug
        run: |
          echo "OS: ${{ matrix.os }}"
          ls -la
          ls engine/ || echo "no engine dir"
          cat requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build (Linux only - test)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --add-data "engine:engine" --hidden-import customtkinter ui/app.py || echo "BUILD FAILED"
          ls dist/ || echo "no dist"
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --name WPS-Detox --add-data "engine:engine" --hidden-import customtkinter ui/app.py || echo "BUILD FAILED"
          ls dist/ || echo "no dist"
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name WPS-Detox-Windows --add-data "engine;engine" --hidden-import customtkinter ui/app.py || echo "BUILD FAILED"
          ls dist/ || echo "no dist"
